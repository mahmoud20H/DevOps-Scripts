# ==========================================
# LVM Setup Default Configuration
# ==========================================
# These values will pre-fill the interactive prompts.
# You can still override them at runtime.

# Default Volume Group and Logical Volume settings
DEFAULT_VG_NAME="vg_data"
DEFAULT_LV_NAME="lv_data"
# Default size for the Logical Volume (can be a percentage or absolute size)
DEFAULT_LV_SIZE="100%FREE"

# Default filesystem to suggest (ext4 or xfs)
DEFAULT_FS_TYPE="ext4"

# Default base directory for new mounts
DEFAULT_MOUNT_BASE="/mnt"

# Set to true to skip the final confirmation warning (DANGEROUS)
AUTO_CONFIRM="false"